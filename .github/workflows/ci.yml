name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref (e.g. new push to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Biome lint + full TypeScript (7) type check — the project quality gate.
      - name: Lint & type-check
        run: yarn lint

      - name: Build
        run: yarn build
